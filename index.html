<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Mixamo Animations - Three.js</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- favicon -->
     <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/main.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">🎮 Mixamo Viewer</span>
        </div>
    </nav>

    <!-- INFO -->
    <div id="info">
        <strong>Controles:</strong><br>
        1 → Crouch To Stand<br>
        2 → Taunt<br>
        3 → MMA Kick<br>
        4 → Fall Flat<br>
        5 → Breakdance
    </div>

    <!-- CANVAS -->
    <div id="canvas-container"></div>

    <!-- FOOTER -->
    <footer>
        Programador: Jean Samuel Laroque | Three.js + Mixamo
    </footer>

    <!-- IMPORTMAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "./assets/build/three.module.js",
            "three/addons/": "./assets/jsm/"
        }
    }
    </script>

    <!-- MAIN -->
    <script type="module" src="./assets/js/main.js"></script>

</body>
<!-- INFO -->
<div id="info" class="glass">
    <h5>🎮 Controles</h5>
    1 → Crouch<br>
    2 → Taunt<br>
    3 → Kick<br>
    4 → Fall<br>
    5 → Breakdance
</div>

<!-- BOTONES VISUALES -->
<div class="controls-box glass">
    <h5>Acciones</h5>
    <button class="glass-btn" onclick="playAnim('1')">Crouch</button>
    <button class="glass-btn" onclick="playAnim('2')">Taunt</button>
    <button class="glass-btn" onclick="playAnim('3')">Kick</button>
    <button class="glass-btn" onclick="playAnim('4')">Fall</button>
    <button class="glass-btn" onclick="playAnim('5')">Breakdance</button>
</div>
</html>
